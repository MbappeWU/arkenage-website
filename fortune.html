<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI新年运势预测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: linear-gradient(145deg, #1f4068, #162447); border-radius: 24px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #ffd700; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .subtitle { color: #a0a0a0; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #fff; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 14px; border: 2px solid #ffd700; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; text-align: center; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #ffd700, #ff9500); color: #1a1a2e; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,215,0,0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .result { margin-top: 30px; padding: 20px; background: rgba(255,215,0,0.1); border-radius: 16px; display: none; }
        .result.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .zodiac { font-size: 48px; margin-bottom: 10px; }
        .fortune { color: #ffd700; font-size: 20px; margin-bottom: 15px; }
        .detail { color: #d0d0d0; font-size: 14px; line-height: 1.8; text-align: left; }
        .detail div { margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .detail strong { color: #ffd700; }
        .tips { margin-top: 20px; color: #808080; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="zodiac">🔮</div>
        <h1>✨ AI新年运势预测 ✨</h1>
        <p class="subtitle">输入姓名，AI为你预测2026年运势</p>
        
        <div class="input-group">
            <input type="text" id="name" placeholder="请输入你的名字" maxlength="10">
        </div>
        
        <button onclick="predict()" id="predictBtn">开始预测</button>
        
        <div class="result" id="result">
            <div class="fortune" id="fortuneTitle"></div>
            <div class="detail" id="fortuneDetail"></div>
        </div>
        
        <p class="tips">仅供娱乐，祝您新年快乐！🎊</p>
    </div>

    <script>
        const fortunes = {
            great: {
                title: "🌟 上上签！运势爆棚！",
                items: [
                    { title: "💰 财运", content: "新年财源广进！可能有意外惊喜，或获得额外收入机会。投资理财运气极佳，但需谨慎决策。" },
                    { title: "❤️ 感情", content: "桃花运旺盛！单身者有望遇到正缘，已有伴侣者感情更加甜蜜。" },
                    { title: "💼 事业", content: "事业腾飞！工作顺利，有望升职加薪或获得重要机会。" },
                    { title: "🍀 健康", content: "身体康健！精力充沛，适合开始新的健康计划。" }
                ]
            },
            good: {
                title: "😊 中吉签！稳中有升！",
                items: [
                    { title: "💰 财运", content: "财运平稳，通过努力可获得相应回报。建议稳健理财。" },
                    { title: "❤️ 感情", content: "感情运势不错，单身者有机会认识新朋友，已有伴侣者相处融洽。" },
                    { title: "💼 事业", content: "事业稳中有进，保持当前状态，多学习新技能。" },
                    { title: "🍀 健康", content: "健康良好，注意休息，保持规律作息。" }
                ]
            },
            normal: {
                title: "🙂 中平签！平淡是真！",
                items: [
                    { title: "💰 财运", content: "财运一般，保持理性消费，积累储蓄。" },
                    { title: "❤️ 感情", content: "感情平稳，多花时间陪伴家人朋友。" },
                    { title: "💼 事业", content: "事业平稳发展，需要耐心等待机会。" },
                    { title: "🍀 健康", content: "健康平稳，注意劳逸结合。" }
                ]
            }
        };

        function predict() {
            const name = document.getElementById('name').value.trim();
            if (!name) {
                alert('请输入你的名字！');
                return;
            }

            const btn = document.getElementById('predictBtn');
            btn.disabled = true;
            btn.textContent = '🔮 AI分析中...';

            // 根据名字生成随机但一致的结果
            const hash = name.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const rand = (hash % 100) / 100;
            
            setTimeout(() => {
                let result;
                if (rand > 0.7) result = fortunes.great;
                else if (rand > 0.3) result = fortunes.good;
                else result = fortunes.normal;

                document.getElementById('fortuneTitle').textContent = result.title;
                
                let detailHtml = `<div><strong>🎉 ${name}，2026年运势如下：</strong></div>`;
                result.items.forEach(item => {
                    detailHtml += `<div><strong>${item.title}</strong><br>${item.content}</div>`;
                });
                
                document.getElementById('fortuneDetail').innerHTML = detailHtml;
                document.getElementById('result').classList.add('show');
                
                btn.disabled = false;
                btn.textContent = '重新预测';
            }, 1500);
        }
    </script>
</body>
</html>
